<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - HMates</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation -->
    <header class="main-header">
        <div class="container">
            <nav class="navbar">
                <a href="index.html" class="logo">
                    <div style="width:45px;height:45px;background:linear-gradient(135deg,var(--primary),var(--accent));border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:1.2rem;">H</div>
                    <h1>HMates<span>.</span></h1>
                </a>
                <div class="nav-links">
                    <a href="index.html" class="nav-link">Home</a>
                    <a href="hostels.html" class="nav-link">Hostels</a>
                    <a href="booking.html" class="nav-link">Book Now</a>
                    <a href="contact.html" class="nav-link active">Contact</a>
                    <a href="owner.html" class="nav-link">Owner</a>
                    <a href="login.html" class="login-btn nav-link">Login</a>
                </div>
            </nav>
        </div>
    </header>

    <!-- Contact Page -->
    <main style="padding: 5rem 0;">
        <div class="container" style="max-width: 900px;">
            <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 4rem; margin-top: 3rem;">
                <!-- Contact Info -->
                <div>
                    <div style="background: var(--white); padding: 2.5rem; border-radius: 20px; box-shadow: var(--shadow); text-align: center; margin-bottom: 2rem;">
                        <i class="fas fa-headset" style="color: var(--primary); font-size: 3rem; margin-bottom: 1rem;"></i>
                        <h3>24/7 Support</h3>
                        <p>support@hmates.com</p>
                        <p><strong>+91 98765 43210</strong></p>
                    </div>
                    <div style="background: var(--white); padding: 2.5rem; border-radius: 20px; box-shadow: var(--shadow);">
                        <h4 style="margin-bottom: 1rem;">Our Locations</h4>
                        <p><i class="fas fa-map-marker-alt"></i> Near JECRC University<br>Sitapura, Jaipur - 302022</p>
                    </div>
                </div>

                <!-- Contact Form -->
                <div style="background: var(--white); padding: 3rem; border-radius: 25px; box-shadow: var(--shadow-lg);">
                    <h3>Send Message</h3>
                    <form onsubmit="handleContact(event)">
                        <div class="form-row">
                            <div class="form-group">
                                <label>Name</label>
                                <input type="text" id="contactName" required>
                            </div>
                            <div class="form-group">
                                <label>Email</label>
                                <input type="email" id="contactEmail" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Message</label>
                            <textarea id="contactMsg" rows="6" required></textarea>
                        </div>
                        <button type="submit" class="btn-primary">Send Message</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer style="background: var(--dark); color: var(--white); text-align: center; padding: 3rem 0 2rem;">
        <div class="container">
            <p>© 2026 HMates | All data stored locally | Made for JECRC students</p>
        </div>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
