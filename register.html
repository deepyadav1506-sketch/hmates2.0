<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - HMates</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
    <main>
        <div class="login-wrapper">
            <div class="login-card">
                <div class="login-icon">
                    <i class="fas fa-user-plus"></i>
                </div>
                <div class="login-text">
                    <h2>Join HMates</h2>
                    <p>Create account in 30 seconds</p>
                </div>
                <form onsubmit="handleRegister(event)">
                    <div class="input-group">
                        <label>Join as</label>
                        <select id="regRole" onchange="toggleRegField()" required>
                            <option value="student">Student/Tenant</option>
                            <option value="owner">Hostel Owner</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" id="regName" placeholder="Full Name" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" id="regEmail" placeholder="Email" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-phone input-icon"></i>
                        <input type="tel" id="regPhone" placeholder="Phone (10 digits)" required>
                    </div>
                    <div class="input-group" id="regOrgGroup">
                        <i class="fas fa-university input-icon"></i>
                        <input type="text" id="regOrg" placeholder="College/Hostel Name">
                    </div>
                    <div class="input-group">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="regPass" placeholder="Password (6+ chars)" required>
                    </div>
                    <button type="submit" class="btn-primary">Create Account</button>
                </form>
                <p style="margin-top: 1.5rem;">Have account? <a href="login.html" style="color: var(--primary); font-weight: 500;">Login</a></p>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer style="background: var(--dark); color: var(--white); text-align: center; padding: 3rem 0 2rem;">
        <div class="container">
            <p>© 2026 HMates | All data stored locally | Made for JECRC students</p>
        </div>
    </footer>

    <script src="js/auth.js"></script>
    <script src="js/script.js"></script>

</body>
</html>
