<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hostels - HMates</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Navigation -->
    <header class="main-header">

        <div class="container">

            <nav class="navbar">

                <a href="index.html" class="logo">
                    <img src="css/logo.png" alt="HMates Logo">
                    <h1>HMates<span>.</span></h1>
                </a>

                <div class="nav-links">
                    <a href="index.html" class="nav-link">Home</a>
                    <a href="hostels.html" class="nav-link active">Hostels</a>
                    <a href="booking.html" class="nav-link">Book Now</a>
                    <a href="contact.html" class="nav-link">Contact</a>
                    <a href="owner.html" class="nav-link">Owner</a>
                    <a href="login.html" class="login-btn nav-link">Login</a>
                </div>

            </nav>

        </div>

    </header>

    <!-- Main -->
    <main>

        <div class="container">

            <div class="listing-header text-center">

                <h2>Explore Verified Hostels</h2>

                <p>
                    Find AC & Non-AC rooms according to your budget and facilities.
                </p>

            </div>

            <!-- Filters -->
            <div class="filter-wrapper">

                <div class="top-filters">

                    <select id="hostelFilter" onchange="filterHostels()">

                        <option value="all">All Hostels</option>
                        <option value="boys">Boys Hostel</option>
                        <option value="girls">Girls Hostel</option>
                        <option value="premium">Premium Hostel</option>

                    </select>

                    <input
                        type="text"
                        id="hostelSearch"
                        placeholder="Search hostels..."
                        oninput="filterHostels()"
                    >

                    <input
                        type="number"
                        id="minPrice"
                        placeholder="Min Price"
                        oninput="filterHostels()"
                    >

                    <input
                        type="number"
                        id="maxPrice"
                        placeholder="Max Price"
                        oninput="filterHostels()"
                    >

                </div>

                <!-- Facility Filters -->
                <div class="facility-filters">

                    <label>
                        <input type="checkbox" value="ac" onchange="filterHostels()">
                        AC
                    </label>

                    <label>
                        <input type="checkbox" value="non-ac" onchange="filterHostels()">
                        Non-AC
                    </label>

                    <label>
                        <input type="checkbox" value="wifi" onchange="filterHostels()">
                        WiFi
                    </label>

                    <label>
                        <input type="checkbox" value="laundry" onchange="filterHostels()">
                        Laundry
                    </label>

                </div>

            </div>

            <!-- Dynamic Hostel Cards -->
            <div class="cards-container" id="hostelGrid"></div>

            <!-- No Results -->
            <div id="noResults" class="hidden text-center">

                <i class="fas fa-search"
                    style="font-size:4rem;margin-bottom:1rem;opacity:0.5;">
                </i>

                <h3>No Hostels Found</h3>

                <p>Try changing your filters.</p>

            </div>

        </div>

    </main>

    <!-- Footer -->
    <footer style="background: var(--dark); color: white; text-align: center; padding: 3rem 0;">
        <div class="container">
            <p>© Made By TechTrio</p>
        </div>
    </footer>

    <script src="js/script.js"></script>

</body>

</html>
